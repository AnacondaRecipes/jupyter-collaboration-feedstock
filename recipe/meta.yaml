{% set name = "jupyter-collaboration" %}
{% set version = "4.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-','_') }}-{{ version }}.tar.gz
  sha256: 6ef03664fdda0fddf47d2904db29a659c8ef4d2f307080b89cdef72e7e7b24c9

build:
  skip: true  # [py<38]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatchling >=1.4.0
    - pip
    - python
  run:
    - jupyter_server_ydoc >=2.3.0,<3
    - jupyter-collaboration-ui >=2.3.0,<3
    - jupyter-docprovider >=2.3.0,<3
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}
    - python

tests:
  - python:
      imports: jupyter_collaboration
      pip_check: true
  - requirements:
      run:
        - jupyterlab
    script:
      - jupyter server extension list
      - jupyter labextension list --debug
      - jupyter labextension list 2>&1 | ${{ grep }} "collaboration-extension.*OK"
      - jupyter labextension list 2>&1 | ${{ grep }} "docprovider-extension.*OK"
about:
  summary: JupyterLab/Jupyter Notebook 7+ Real Time Collaboration extension (metapackage)
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/jupyter-collaboration
  repository: https://github.com/jupyterlab/jupyter-collaboration
  documentation: https://jupyterlab-realtime-collaboration.readthedocs.io

extra:
  recipe-maintainers:
    - hbcarlos
    - martinRenou
    - fcollonval
    - davidbrochart
    - conda-forge/jupyterlab
