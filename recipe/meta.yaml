{% set name = "jupyter-collaboration" %}
{% set version = "4.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-','_') }}-{{ version }}.tar.gz
  sha256: 6ef03664fdda0fddf47d2904db29a659c8ef4d2f307080b89cdef72e7e7b24c9

build:
  skip: true  # [py<38]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatchling >=1.4.0
    - pip
    - python
  run:
    - python
    - jupyter-collaboration-ui >=2.3.0,<3
    - jupyter-docprovider >=2.3.0,<3
    - jupyter_server_ydoc >=2.3.0,<3
    - jupyterlab >=4.4.0,<5.0.0

test:
  imports: 
    - jupyter_collaboration
  requires:
    - jupyterlab
    - pip
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - jupyter server extension list
    - jupyter labextension list --debug
    - jupyter labextension list 2>&1 | grep -iE "collaboration-extension.*OK"       # [unix]
    - jupyter labextension list 2>&1 | grep -iE "docprovider-extension.*OK"         # [unix]
    - jupyter labextension list 2>&1 | findstr /r /i "collaboration-extension.*OK"  # [win]
    - jupyter labextension list 2>&1 | findstr /r /i "docprovider-extension.*OK"    # [win]

about:
  home: https://pypi.org/project/jupyter-collaboration
  summary: JupyterLab/Jupyter Notebook 7+ Real Time Collaboration extension (metapackage)
  description: JupyterLab/Jupyter Notebook 7+ Real Time Collaboration extension (metapackage)
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://github.com/jupyterlab/jupyter-collaboration
  doc_url: https://jupyterlab-realtime-collaboration.readthedocs.io

extra:
  recipe-maintainers:
    - hbcarlos
    - martinRenou
    - fcollonval
    - davidbrochart
    - conda-forge/jupyterlab
